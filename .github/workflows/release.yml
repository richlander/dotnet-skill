name: Publish

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI workflow run ID to publish from'
        required: true
      confirm:
        description: 'Type "publish" to confirm NuGet release'
        required: true

permissions:
  actions: read
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'publish'
    environment: nuget
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Download all packages from CI run
        uses: actions/download-artifact@v8
        with:
          path: packages
          pattern: package-*
          merge-multiple: true
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List packages
        run: ls -la packages/

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: NuGet login (OIDC -> temp API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish packages
        run: |
          # 1. Publish RID-specific AOT packages first.
          for pkg in packages/dotnet-skill.win-*.nupkg packages/dotnet-skill.linux-*.nupkg packages/dotnet-skill.osx-*.nupkg; do
            if [[ -f "$pkg" ]]; then
              echo "Publishing $pkg"
              dotnet nuget push "$pkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
            fi
          done

          # 2. Publish any (non-AOT) package.
          for pkg in packages/dotnet-skill.any.*.nupkg; do
            if [[ -f "$pkg" ]]; then
              echo "Publishing any package: $pkg"
              dotnet nuget push "$pkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
            fi
          done

          # 3. Publish pointer package last.
          for pkg in packages/dotnet-skill.[0-9]*.nupkg; do
            if [[ -f "$pkg" ]]; then
              echo "Publishing pointer package: $pkg"
              dotnet nuget push "$pkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
            fi
          done
        shell: bash

      - name: Get version
        id: version
        run: |
          VERSION=$(sed -n 's:.*<VersionPrefix>\([^<]*\)</VersionPrefix>.*:\1:p' src/Directory.Build.props | head -n 1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: packages/*.nupkg
          generate_release_notes: true
