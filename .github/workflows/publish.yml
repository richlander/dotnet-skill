name: Publish

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI workflow run ID to publish from'
        required: true
      confirm:
        description: 'Type "publish" to confirm NuGet release'
        required: true

permissions:
  actions: read
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'publish'
    environment: nuget
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Download package from CI run
        uses: actions/download-artifact@v8
        with:
          path: packages
          name: package
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List packages
        run: ls -la packages/

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: NuGet login (OIDC -> temp API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish package
        run: |
          shopt -s nullglob
          packages=(packages/dotnet-skill.*.nupkg)
          if [ ${#packages[@]} -ne 1 ]; then
            echo "Expected exactly one dotnet-skill package, found ${#packages[@]}." >&2
            exit 1
          fi

          dotnet nuget push "${packages[0]}" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
        shell: bash

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<VersionPrefix>)[^<]+' src/dotnet-skill/dotnet-skill.csproj)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: packages/*.nupkg
          generate_release_notes: true
