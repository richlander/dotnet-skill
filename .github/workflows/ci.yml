name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only)
          else
            BEFORE=${{ github.event.before }}
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE=HEAD~1
            fi
            FILES=$(git diff --name-only "$BEFORE"..."${{ github.sha }}")
          fi
          CODE=false
          DOCS=false
          while IFS= read -r file; do
            case "$file" in
              src/*)
                case "$file" in
                  *.md|*.txt) ;;
                  *) CODE=true ;;
                esac ;;
              *.props|*.sln|*.slnx) CODE=true ;;
              .github/workflows/*) CODE=true ;;
            esac
            case "$file" in
              *.md|*.txt|docs/*|taste/*) DOCS=true ;;
            esac
          done <<< "$FILES"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "docs=$DOCS" >> "$GITHUB_OUTPUT"
          echo "Changed files:"
          echo "$FILES"
          echo "code=$CODE docs=$DOCS"
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Build
        run: dotnet build src/dotnet-skill/dotnet-skill.cs -c Release

      - name: Run from source
        run: |
          dotnet run src/dotnet-skill/dotnet-skill.cs -c Release | cat > skill.md
          cmp -s skill.md src/dotnet-skill/SKILL.md

      - name: Pack pointer package
        run: dotnet pack src/dotnet-skill/dotnet-skill.cs -c Release -p:OfficialBuild=true

      - name: Upload pointer package
        uses: actions/upload-artifact@v7
        with:
          name: package-pointer
          path: artifacts/package/release/*.nupkg
          if-no-files-found: error

      - name: Pack any package
        run: dotnet pack src/dotnet-skill/dotnet-skill.cs -c Release -r any -p:PublishAot=false -p:OfficialBuild=true

      - name: Upload any package
        uses: actions/upload-artifact@v7
        with:
          name: package-any
          path: artifacts/package/release/*.nupkg
          if-no-files-found: error

      - name: Pack linux-x64 AOT package
        run: dotnet pack src/dotnet-skill/dotnet-skill.cs -c Release -r linux-x64 -p:OfficialAotBuild=true

      - name: Upload linux-x64 package
        uses: actions/upload-artifact@v7
        with:
          name: package-linux-x64
          path: artifacts/package/release/*.nupkg
          if-no-files-found: error

      - name: Install tool from local package
        run: |
          dotnet tool install --tool-path ./.tools dotnet-skill --add-source ./artifacts/package/release --no-cache
          PATH="$(pwd)/.tools:$PATH" dotnet skill | cat > installed-skill.md
          cmp -s installed-skill.md src/dotnet-skill/SKILL.md

  pack-rid:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: win-arm64
            os: windows-latest
          - rid: linux-arm64
            os: ubuntu-24.04-arm
          - rid: osx-arm64
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Pack RID-specific AOT package
        run: dotnet pack src/dotnet-skill/dotnet-skill.cs -c Release -r ${{ matrix.rid }} -p:OfficialAotBuild=true

      - name: Upload RID package
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.rid }}
          path: artifacts/package/release/*.nupkg
          if-no-files-found: error
